# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: seattle-hotel-hosted-agent
services:
    SeattleHotelConcierge:
        project: SeattleHotelAgent.Hosted.Agent
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.25"
                    memory: 0.5Gi
                scale:
                    maxReplicas: 1
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4o-mini
                    version: "2024-07-18"
                  name: chat
                  sku:
                    capacity: 1
                    name: GlobalStandard
            startupCommand: dotnet SeattleHotelAgent.Hosted.Agent.dll
